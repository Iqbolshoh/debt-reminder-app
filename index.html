<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Debt Reminder System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg"></div>

<div class="container">

  <div class="card">

    <h1>💰 Debt Reminder</h1>
    <p class="sub">Send payment reminders instantly</p>

    <input type="text" id="name" placeholder="Debtor name">
    <input type="text" id="phone" placeholder="Phone number (+998...)">
    <input type="text" id="amount" placeholder="Debt amount">

    <button onclick="sendData()">Send Reminder</button>

    <div id="result"></div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
