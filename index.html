<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Debt Reminder System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
 <header class="topbar">

  <!-- LEFT -->
  <div class="brand">
    <div class="logo">💰 DebtPro</div>
    <div class="tag">Smart Finance System</div>
  </div>

  <!-- CENTER -->
  <nav class="menu">
    <a href="#" class="active">Overview</a>
    <a href="#">Debts</a>
    <a href="#">Payments</a>
    <a href="#">Reports</a>
    <a href="#">Settings</a>
  </nav>

  <!-- RIGHT -->
  <div class="right">

    <div class="status">
      <span class="dot"></span>
      Online
    </div>

    <button class="btn ghost">Export</button>
    <button class="btn primary">+ New Debt</button>

  </div>

</header>

<!-- MINI DASH INFO BAR -->
<section class="infobar">

  <div class="info">
    <span>Total Debtors</span>
    <h3>1,284</h3>
  </div>

  <div class="info">
    <span>Pending</span>
    <h3>$42,500</h3>
  </div>

  <div class="info">
    <span>Recovered</span>
    <h3>$96,200</h3>
  </div>

  <div class="info highlight">
    <span>Success Rate</span>
    <h3>92.4%</h3>
  </div>

</section>

<div class="bg"></div>

<div class="container">

  <div class="card">

    <h1>💰 Debt Reminder</h1>
    <p class="sub">Send payment reminders instantly</p>

    <input type="text" id="name" placeholder="Debtor name">
    <input type="text" id="phone" placeholder="Phone number (+998...)">
    <input type="text" id="amount" placeholder="Debt amount">

    <button onclick="sendData()">Send Reminder</button>

    <div id="result"></div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
